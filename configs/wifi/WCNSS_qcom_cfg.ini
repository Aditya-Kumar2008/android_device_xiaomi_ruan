# WCNSS Configuration File for Xiaomi Ruan (Poco Pad 5G / Redmi Pad Pro 5G)
# Based on SM7435 platform

# Enable/Disable WLAN
wlan_enable=1

# Country code
country_code=US

# Band capability - Both 2.4GHz and 5GHz
band_capability=2

# 11n support
11n_support=1

# 11ac support
11ac_support=1

# 11ax support
11ax_support=1

# Channel bonding
channel_bonding=1

# TX power
tx_power=20

# Power saving
power_save=1

# WoWLAN (Wake on Wireless LAN)
wowlan_enable=1

# SoftAP
softap_support=1
softap_max_clients=10

# P2P
p2p_support=1

# WMM
WMM_enable=1

# AMPDU
AMPDU_enable=1

# AMSDU
AMSDU_enable=1

# Beacon interval
beacon_interval=100

# DTIM period
DTIM_period=1

# Listen interval
listen_interval=1

# Short preamble
short_preamble=1

# Short slot time
short_slot_time=1

# Antenna diversity
antenna_diversity=0

# TX chain mask
tx_chain_mask=3

# RX chain mask
rx_chain_mask=3

# Calibration
calibration=1

# Thermal mitigation
thermal_mitigation=1

# DFS master mode
DFS_master_mode=1

# Background scan
background_scan=1

# PNO (Preferred Network Offload)
pno_enable=1

# GSCAN
gscan_enable=1

# RTT
RTT_enable=1

# NAN
NAN_enable=1

# Packet filtering
packet_filtering_enable=1

# ARP offload
arp_offload_enable=1

# NS offload
ns_offload_enable=1

# GTK offload
gtk_offload_enable=1

# Keep alive
keep_alive_enable=1

# BCN early termination
bcn_early_term_enable=1

# LPRx (Low Power RX)
lprx_enable=1

# Lpass support
lpass_support=1

# TDLS support
TDLS_support=1

# IBSS support
IBSS_support=0

# Roaming
roaming_enable=1
roaming_threshold=-75

# Fast roaming
fast_roaming_enable=1

# OKC (Opportunistic Key Caching)
okc_enable=1

# PMF (Protected Management Frames)
pmf_enable=1

# MFP (Management Frame Protection)
mfp_enable=1

# SAP (Secure Access Point)
sap_enable=1

# MBSSID support
mbssid_support=1

# VHT support
vht_support=1

# HE support
he_support=1

# EHT support
eht_support=0

# 6GHz support
6ghz_support=0

# AFC (Automated Frequency Coordination)
afc_enable=0

# SAR (Specific Absorption Rate)
sar_enable=1

# SAR limits
